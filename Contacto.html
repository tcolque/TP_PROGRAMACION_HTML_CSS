<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto - Salta Capital</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./contacto.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">

        <div class="container">

            <a class="navbar-brand" href="index.html">
                Salta Capital
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="info.html">
                            Información
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            Contacto
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- HEADER -->
    <header class="header-contacto">

        <div class="overlay">

            <h1>Contacto</h1>

            <p>
                Consultanos sobre turismo y experiencias en Salta
            </p>

        </div>

    </header>

    <!-- FORMULARIO -->
    <main class="container">

        <section class="form-section shadow-lg">

            <h2 class="titulo-formulario">
                Formulario de Contacto
            </h2>

            <form>

                <div class="row">

                    <!-- NOMBRE -->
                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Nombre
                        </label>

                        <input type="text"
                            class="form-control"
                            placeholder="Ingresá tu nombre">

                    </div>

                    <!-- EMAIL -->
                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                            class="form-control"
                            placeholder="Ingresá tu email">

                    </div>

                </div>

                <!-- CONTRASEÑA -->
                <div class="mb-4">

                    <label class="form-label">
                        Contraseña
                    </label>

                    <input type="password"
                        class="form-control"
                        placeholder="Ingresá una contraseña">

                </div>

                <!-- SELECT -->
                <div class="mb-4">

                    <label class="form-label">
                        Motivo del viaje
                    </label>

                    <select class="form-select">

                        <option>Turismo</option>
                        <option>Trabajo</option>
                        <option>Estudio</option>

                    </select>

                </div>

                <!-- CHECKBOX -->
                <div class="mb-4">

                    <label class="form-label">
                        ¿Qué te interesa?
                    </label>

                    <div class="form-check">

                        <input class="form-check-input"
                            type="checkbox">

                        <label class="form-check-label">
                            Cultura
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input"
                            type="checkbox">

                        <label class="form-check-label">
                            Gastronomía
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input"
                            type="checkbox">

                        <label class="form-check-label">
                            Naturaleza
                        </label>

                    </div>

                </div>

                <!-- MENSAJE -->
                <div class="mb-4">

                    <label class="form-label">
                        Mensaje
                    </label>

                    <textarea class="form-control"
                            rows="5"
                            placeholder="Escribí tu consulta">
                    </textarea>

                </div>

                <!-- BOTONES -->
                <div class="text-center">

                    <button type="submit"
                            class="btn btn-contacto btn-lg">

                        Enviar

                    </button>

                    <button type="reset"
                            class="btn btn-secondary btn-lg">

                        Borrar

                    </button>

                </div>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <p>
            &copy; Colque Tania y Suares Marisa 2026
        </p>

    </footer>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
