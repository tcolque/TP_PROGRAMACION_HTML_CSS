<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto - Salta Capital</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
        <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./Contacto.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">

        <div class="container">

            <a class="navbar-brand" 
            href="Index.html"
            aria-label="Ir a la página principal">
            Salta Capital
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu"
                    aria-controls="menu"
                    aria-expanded="false"
                    aria-label="Abrir menú de navegación">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" 
                        href="Index.html">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" 
                        href="Info.html">
                            Información
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" 
                        href="Contacto.html">
                            Contacto
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- HEADER -->
    <header class="header-contacto"
            aria-label="Encabezado de la página de contacto">

        <div class="overlay">

            <h1>Contacto</h1>

            <p>
                Consultanos sobre turismo y experiencias en Salta
            </p>

        </div>

    </header>

    <!-- FORMULARIO -->
    <main class="container">

        <section class="form-section shadow-lg">

            <h2 class="titulo-formulario">
                Formulario de Contacto
            </h2>

            <form id="formularioContacto" aria-label="Formulario de contacto">

                <div class="row">

                    <!-- NOMBRE -->
                    <div class="col-md-6 mb-4">

                        <label for="nombre" class="form-label">
                            Nombre
                        </label>

                        <input type="text"
                            id="nombre"
                            class="form-control"
                            placeholder="Ingresá tu nombre"
                            required>
                    </div>

                    <!-- EMAIL -->
                    <div class="col-md-6 mb-4">

                        <label for="email" class="form-label">
                            Email
                        </label>

                        <input type="email"
                            id="email"
                            class="form-control"
                            placeholder="Ingresá tu email"
                            required>
                    </div>
                </div>

                <!-- CONTRASEÑA -->
                <div class="mb-4">

                    <label for="password" class="form-label">
                        Contraseña
                    </label>

                    <div class="input-group">

                        <input type="password"
                            id="password"
                            class="form-control"
                            placeholder="Ingresá una contraseña"
                            required>

                        <button type="button"
                                class="btn btn-outline-secondary"
                                id="btnMostrar">

                            <i class="bi bi-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- SELECT -->
                <div class="mb-4">

                    <label for="motivo" class="form-label">
                        Motivo del viaje
                    </label>

                    <select id="motivo" class="form-select">

                        <option>Turismo</option>
                        <option>Trabajo</option>
                        <option>Estudio</option>

                    </select>

                </div>

                <!-- CHECKBOX -->
                <div class="mb-4">

                    <label class="form-label">
                        ¿Qué te interesa?
                    </label>

                    <div class="form-check">

                        <input class="form-check-input"
                            type="checkbox"
                            id="cultura">

                        <label class="form-check-label"
                            for="cultura">
                            Cultura
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input"
                            type="checkbox"
                            id="gastronomia">

                        <label class="form-check-label"
                            for="gastronomia">
                            Gastronomía
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input"
                            type="checkbox"
                            id="naturaleza">

                        <label class="form-check-label"
                            for="naturaleza">
                            Naturaleza
                        </label>

                    </div>

                </div>

                <!-- MENSAJE -->
                <div class="mb-4">

                    <label for="mensaje" class="form-label">
                        Mensaje
                    </label>

                    <textarea id="mensaje"
                        class="form-control"
                        rows="5"
                        placeholder="Escribí tu consulta"
                        required>
                    </textarea>

                </div>

                <!-- BOTONES -->
                <div class="text-center">

                    <button type="submit"
                            class="btn btn-contacto btn-lg">

                        Enviar

                    </button>

                    <button type="reset"
                            class="btn btn-secondary btn-lg">

                        Borrar

                    </button>

                </div>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <p>
            &copy; Colque Tania y Suares Marisa 2026
        </p>

    </footer>

    <!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JAVASCRIPT -->
<script src="Contacto.js"></script>

</body>
</html>
